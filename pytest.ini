[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --strict-markers --tb=short -v --cov=scripts/models --cov=scripts.features.analytics --cov=scripts.features.io --cov=scripts.features.scoring --cov=scripts.transform.transform_stg_xlsx --cov=scripts.run.run_etl --cov-report=term-missing --cov-fail-under=60
markers =
    unit: testes unitarios
    integration: testes de integracao
    validation: testes de validacao de output
    slow: testes lentos (> 5s)
